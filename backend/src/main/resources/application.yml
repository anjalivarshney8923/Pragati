spring:
  application:
    name: pragati-backend

  # PostgreSQL configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/pragati_db
    username: postgres
    password: system # Update with your local database password
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

