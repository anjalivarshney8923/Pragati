spring:
  application:
    name: pragati-backend

  # PostgreSQL configuration (Currently Commented Out)
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/pragati_db
  #   username: postgres
  #   password: yourpassword
  #   driver-class-name: org.postgresql.Driver
  # jpa:
  #   hibernate:
  #     ddl-auto: update
  #   properties:
  #     hibernate:
  #       dialect: org.hibernate.dialect.PostgreSQLDialect

  # H2 Memory Database for testing/development
  datasource:
    url: jdbc:h2:mem:pragatidb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Enable H2 console 
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  # Base64 string for test purposes
  secret: Y2F1dGlvbmFyeS1zaWduLWhvbWV3b3JrLXRlYWNoZXItZ3VpdGFyLWZsb3dlci12aWxsYWdlci1zZWN1cmUta2V5LXByYWdhdGktMjAyNg==
  expiration: 86400000 # 1 day in milliseconds

server:
  port: 8080
